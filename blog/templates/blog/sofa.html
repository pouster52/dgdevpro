<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofá em HTML e CSS</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
        }

        .sofa {
            width: 300px;
            height: 150px;
            background-color: #8B4513;
            border-radius: 15px;
            position: relative;
        }

        .sofa:before,
        .sofa:after {
            content: '';
            position: absolute;
            width: 50px;
            height: 100px;
            background-color: #8B4513;
            top: 25px;
            border-radius: 15px 15px 0 0;
        }

        .sofa:before {
            left: -50px;
        }

        .sofa:after {
            right: -50px;
        }

        .cushions {
            display: flex;
            justify-content: space-between;
            position: absolute;
            top: 25px;
            width: 100%;
            height: 50%;
            padding: 0 10px;
        }

        .cushion {
            width: 30%;
            height: 100%;
            background-color: #CD853F;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="sofa">
        <div class="cushions">
            <div class="cushion"></div>
            <div class="cushion"></div>
            <div class="cushion"></div>
        </div>
    </div>
</body>
</html>
