<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Desenho de Porta</title>
  <style>
    body {
      background-color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .porta {
      width: 150px;
      height: 300px;
      background-color: #8B4513;
      border: 5px solid #5C3317;
      border-radius: 5px;
      position: relative;
      box-shadow: 5px 5px 10px rgba(0,0,0,0.3);
    }
    .maçaneta {
      width: 15px;
      height: 15px;
      background-color: gold;
      border-radius: 50%;
      position: absolute;
      right: 20px;
      top: 140px;
    }
  </style>
</head>
<body>
  <div class="porta">
    <div class="maçaneta"></div>
  </div>
</body>
</html>
