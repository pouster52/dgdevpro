<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desenho de uma Porta</title>
    <style>
        .porta {
            width: 200px;
            height: 400px;
            background-color: #8B4513; /* Cor da porta */
            border: 5px solid #5C4033; /* Cor da borda */
            position: relative;
            margin: 50px auto;
        }
        .maçaneta {
            width: 30px;
            height: 30px;
            background-color: #FFD700; /* Cor da maçaneta */
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
        }
        .janela {
            width: 160px;
            height: 160px;
            background-color: #f4f4f4; /* Cor da janela da porta */
            border: 5px solid #5C4033; /* Cor da borda da janela */
            position: absolute;
            top: 20px;
            left: 20px;
        }
        .janela::before {
            content: "";
            display: block;
            width: 100%;
            height: 50%;
            background-color: #8B4513; /* Cor do meio da janela */
            position: absolute;
            top: 50%;
            left: 0;
            border-top: 5px solid #5C4033; /* Linha da divisão da janela */
        }
    </style>
</head>
<body>
    <div class="porta">
        <div class="janela"></div>
        <div class="maçaneta"></div>
    </div>
</body>
</html>
